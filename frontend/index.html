<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hospital Beds - Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-gradient">
    <div class="container auth-container">
        <div class="auth-card glass-effect">
            <h1 class="brand-title">LifeCare Networks</h1>
            <p class="subtitle">Access Hospital Bed Availability</p>
            
            <div class="tabs">
                <button class="tab-btn active" id="loginTab">Login</button>
                <button class="tab-btn" id="registerTab">Register</button>
            </div>

            <form id="authForm" class="auth-form">
                <div class="input-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" placeholder="you@example.com" required>
                </div>
                <div class="input-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="Enter your password" required>
                </div>
                <button type="submit" class="submit-btn" id="submitBtn">Login</button>
                <div id="authMessage" class="message"></div>
            </form>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
